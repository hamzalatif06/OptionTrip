name: Deploy Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build Frontend
        working-directory: ./Frontend
        run: |
          npm install
          npm run build
          tar -czf frontend-build.tar.gz -C dist .
      
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      
      - name: Upload Frontend Build
        run: |
          # Get droplet IP
          DROPLET_IP=$(doctl compute droplet get ${{ secrets.DROPLET_ID }} --format PublicIPv4 --no-header)
          
          # Add to known hosts
          mkdir -p ~/.ssh
          ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts
          
          # Upload build
          scp Frontend/frontend-build.tar.gz root@$DROPLET_IP:/tmp/
      
      - name: Deploy to Droplet
        run: |
          doctl compute ssh ${{ secrets.DROPLET_ID }} --ssh-command "
            echo '📥 Pulling latest changes...'
            cd ~/OptionTrip
            git pull origin main
            
            echo '🚀 Deploying Backend...'
            cd ~/OptionTrip/Backend
            npm install
            pm2 restart optiontrip-backend
            
            echo '🎨 Deploying Frontend...'
            rm -rf /var/www/optiontrip/*
            tar -xzf /tmp/frontend-build.tar.gz -C /var/www/optiontrip/
            chown -R www-data:www-data /var/www/optiontrip
            chmod -R 755 /var/www/optiontrip
            rm /tmp/frontend-build.tar.gz
            
            echo '✅ Deployment complete!'
            pm2 status
          "
